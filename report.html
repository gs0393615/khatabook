<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Report</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <div class="logo-section">
            <h1 class="company-name">📥 Download Report</h1>
        </div>
        <div class="header-right">
            <button class="add-btn" onclick="goHome()" title="Back to Home" style="font-size:18px;">←</button>
        </div>
    </header>

    <section style="padding: 30px 20px;">
        <div class="glass-card" style="padding: 25px; max-width: 480px; margin: auto;">

            <h2 style="margin-bottom: 6px; font-size: 20px;">📊 Generate PDF Report</h2>
            <p style="font-size: 13px; color:#555; margin-bottom: 20px;">
                Current month + 2 previous months available
            </p>

            <label style="font-weight:600; font-size:14px; display:block; margin-bottom:6px;">📅 Select Month</label>
            <select id="reportMonth" style="width:100%; padding:11px 14px; margin-bottom:14px;
                   border-radius:8px; border:2px solid #000; font-size:14px;
                   box-shadow:3px 3px 0px #000; background:white; cursor:pointer; outline:none;">
            </select>

            <label style="font-weight:600; font-size:14px; display:block; margin-bottom:6px;">👷 Worker Type</label>
            <select id="reportType" style="width:100%; padding:11px 14px;
                   border-radius:8px; border:2px solid #000; font-size:14px;
                   box-shadow:3px 3px 0px #000; background:white; cursor:pointer; outline:none;">
                <option value="all">All Workers</option>
                <option value="headWorkers">मिस्त्री (Head Workers)</option>
                <option value="labourers">लेबर (Labourers)</option>
            </select>

            <!-- PDF Preview summary -->
            <div id="previewBox" style="
            display:none;
            margin-top: 18px;
            padding: 14px;
            background: white;
            border-radius: 8px;
            border: 2px solid #000;
            font-size: 13px;
            line-height: 1.8;
        "></div>

            <button id="downloadBtn" style="margin-top: 22px; width: 100%; padding: 13px;
                   font-size: 15px; font-weight: 700;
                   border: 2.5px solid #000; border-radius: 8px;
                   background: #00ff88; cursor: pointer;
                   box-shadow: 4px 4px 0px #000;
                   transition: transform 0.1s, box-shadow 0.1s;"
                onmousedown="this.style.transform='translate(2px,2px)';this.style.boxShadow='2px 2px 0px #000'"
                onmouseup="this.style.transform='';this.style.boxShadow='4px 4px 0px #000'" onclick="downloadPDF()">
                📄 Download PDF Report
            </button>

        </div>
    </section>

    <!-- jsPDF + AutoTable from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script>

        function goHome() {
            window.location.href = "index.html";
        }

        // ================= POPULATE MONTHS (current + 2 previous only) =================

        document.addEventListener("DOMContentLoaded", () => {
            const select = document.getElementById("reportMonth");
            const today = new Date();

            // Only 3 options: current month and 2 months back
            for (let i = 0; i < 3; i++) {
                const date = new Date(today.getFullYear(), today.getMonth() - i);
                const option = document.createElement("option");
                option.value = `${date.getFullYear()}-${date.getMonth()}`;
                option.text = date.toLocaleDateString("en-IN", { month: "long", year: "numeric" });
                select.appendChild(option);
            }

            updatePreview();
        });

        document.getElementById("reportMonth").addEventListener("change", updatePreview);
        document.getElementById("reportType").addEventListener("change", updatePreview);

        // ================= PREVIEW =================

        function getReportData() {
            const [year, month] = reportMonth.value.split("-").map(Number);
            const typeFilter = reportType.value;
            const employees = JSON.parse(localStorage.getItem("employees")) || [];
            const rows = [];

            employees.forEach(emp => {
                if (typeFilter !== "all" && emp.type !== typeFilter) return;

                let presentCount = 0;
                let absentCount = 0;
                let totalPaidMonth = 0;

                for (let date in emp.attendance) {
                    const d = new Date(date);
                    if (d.getMonth() === month && d.getFullYear() === year) {
                        if (emp.attendance[date] === "present") presentCount++;
                        if (emp.attendance[date] === "absent") absentCount++;
                    }
                }

                for (let date in emp.payments) {
                    const d = new Date(date);
                    if (d.getMonth() === month && d.getFullYear() === year) {
                        totalPaidMonth += emp.payments[date];
                    }
                }

                const earned = presentCount * emp.wage;
                const balance = earned - totalPaidMonth;

                rows.push({
                    name: emp.name,
                    phone: emp.phone || "—",
                    type: emp.type === "headWorkers" ? "मिस्त्री" : "लेबर",
                    present: presentCount,
                    absent: absentCount,
                    wage: emp.wage,
                    earned,
                    paid: totalPaidMonth,
                    balance
                });
            });

            return rows;
        }

        function updatePreview() {
            const rows = getReportData();
            const box = document.getElementById("previewBox");

            if (!rows.length) {
                box.style.display = "block";
                box.innerHTML = "<b>⚠️ इस महीने के लिए कोई डेटा नहीं मिला।</b>";
                return;
            }

            const totalEarned = rows.reduce((s, r) => s + r.earned, 0);
            const totalPaid = rows.reduce((s, r) => s + r.paid, 0);
            const totalBalance = rows.reduce((s, r) => s + r.balance, 0);

            box.style.display = "block";
            box.innerHTML = `
        <b>📋 Preview</b><br>
        👥 Employees: <b>${rows.length}</b><br>
        💰 Total Earned: <b>₹${totalEarned}</b><br>
        💸 Total Paid: <b>₹${totalPaid}</b><br>
        ⚖️ Total Balance: <b style="color:${totalBalance >= 0 ? '#1a7a3f' : '#c0392b'}">₹${totalBalance}</b>
    `;
        }

        // ================= PDF DOWNLOAD =================

        function downloadPDF() {
            const rows = getReportData();

            if (!rows.length) {
                alert("इस महीने के लिए कोई डेटा नहीं मिला।");
                return;
            }

            const [year, month] = reportMonth.value.split("-").map(Number);
            const monthLabel = new Date(year, month).toLocaleDateString("en-IN", {
                month: "long", year: "numeric"
            });

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

            const pageW = doc.internal.pageSize.getWidth();

            // ── Header banner ──────────────────────────────────────────────
            doc.setFillColor(255, 222, 89);   // #ffde59
            doc.rect(0, 0, pageW, 28, "F");
            doc.setDrawColor(0);
            doc.setLineWidth(0.8);
            doc.line(0, 28, pageW, 28);

            doc.setFont("helvetica", "bold");
            doc.setFontSize(20);
            doc.setTextColor(0, 0, 0);
            doc.text("KHATABOOK", pageW / 2, 13, { align: "center" });

            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.text("Attendance & Payment Report", pageW / 2, 21, { align: "center" });

            // ── Sub-header info ─────────────────────────────────────────────
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text(`Month: ${monthLabel}`, 14, 36);
            doc.setFont("helvetica", "normal");
            doc.text(
                `Generated: ${new Date().toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" })}`,
                pageW - 14, 36,
                { align: "right" }
            );

            doc.setDrawColor(180);
            doc.setLineWidth(0.3);
            doc.line(14, 39, pageW - 14, 39);

            // ── Table ────────────────────────────────────────────────────────
            const tableBody = rows.map((r, i) => [
                i + 1,
                r.name,
                r.phone,
                r.type,
                r.present,
                r.absent,
                `Rs.${r.wage}`,
                `Rs.${r.earned}`,
                `Rs.${r.paid}`,
                { content: `Rs.${r.balance}`, styles: { textColor: r.balance >= 0 ? [22, 100, 52] : [180, 30, 30] } }
            ]);

            doc.autoTable({
                startY: 43,
                head: [[
                    "S.no", "Name",
                    "Present\n(days)", "Absent\n(days)",
                    "Wage", "Earned", "Paid", "Balance"
                ]],
                body: tableBody,
                styles: {
                    font: "helvetica",
                    fontSize: 9,
                    cellPadding: 3.5,
                    lineColor: [0, 0, 0],
                    lineWidth: 0.25
                },
                headStyles: {
                    fillColor: [0, 0, 0],
                    textColor: [255, 222, 89],
                    fontStyle: "bold",
                    halign: "center",
                    fontSize: 10
                },
                columnStyles: {
                    0: { halign: "center", cellWidth: 12 },
                    1: { cellWidth: 40 },
                    2: { cellWidth: 12 },
                    3: { cellWidth: 12, halign: "center" },
                    4: { halign: "center", cellWidth: 22 },
                    5: { halign: "center", cellWidth: 22 },
                    6: { halign: "right", cellWidth: 22 },
                    7: { halign: "right", cellWidth: 30 },
                },
                alternateRowStyles: { fillColor: [248, 250, 255] },
                rowPageBreak: "auto",
                theme: "grid"
            });

            // ── Totals footer ─────────────────────────────────────────────
            const finalY = doc.lastAutoTable.finalY + 6;
            const totalEarned = rows.reduce((s, r) => s + r.earned, 0);
            const totalPaid = rows.reduce((s, r) => s + r.paid, 0);
            const totalBalance = rows.reduce((s, r) => s + r.balance, 0);

            doc.setFillColor(255, 222, 89);
            doc.rect(14, finalY, pageW - 28, 18, "F");
            doc.setDrawColor(0);
            doc.setLineWidth(0.5);
            doc.rect(14, finalY, pageW - 28, 18);

            doc.setFont("helvetica", "bold");
            doc.setFontSize(10);
            doc.setTextColor(0);
            doc.text(`Total Employees: ${rows.length}`, 18, finalY + 7);
            doc.text(`Total Earned: Rs.${totalEarned}`, 18, finalY + 13);
            doc.text(`Total Paid: Rs.${totalPaid}`, pageW / 2, finalY + 7, { align: "center" });

            const balColor = totalBalance >= 0 ? [22, 100, 52] : [180, 30, 30];
            doc.setTextColor(...balColor);
            doc.text(`Balance: Rs.${totalBalance}`, pageW - 18, finalY + 10, { align: "right" });

            // ── Footer line ───────────────────────────────────────────────
            const pageH = doc.internal.pageSize.getHeight();
            doc.setTextColor(150);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(8);
            doc.text("Generated by Khatabook Attendance System", pageW / 2, pageH - 8, { align: "center" });

            // ── Save ──────────────────────────────────────────────────────
            doc.save(`Attendance_${monthLabel.replace(" ", "_")}.pdf`);
        }

    </script>
</body>

</html>
