<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Report</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="logo-section">
        <h1 class="company-name">Download Report</h1>
    </div>

    <div class="header-right">
        <button class="add-btn" onclick="goHome()">←</button>
    </div>
</header>

<section style="padding:30px;">

    <div class="glass-card" style="padding:25px; max-width:500px; margin:auto;">

        <h2 style="margin-bottom:20px;">Generate Report</h2>

        <label>Select Month</label>
        <select id="reportMonth"></select>

        <label style="margin-top:15px;">Worker Type</label>
        <select id="reportType">
            <option value="all">All</option>
            <option value="headWorkers">Head Workers</option>
            <option value="labourers">Labourers</option>
        </select>

        <button style="margin-top:20px; width:100%;" 
            onclick="downloadReport()">
            Download Excel
        </button>

    </div>

</section>

<script>

// ================= NAVIGATION =================

function goHome() {
    window.location.href = "index.html";
}

// ================= LOAD MONTH OPTIONS =================

document.addEventListener("DOMContentLoaded", () => {

    const select = document.getElementById("reportMonth");
    const today = new Date();

    for (let i = 0; i < 3; i++) {
        const date = new Date(today.getFullYear(), today.getMonth() - i);
        const option = document.createElement("option");

        option.value = date.toISOString();
        option.text =
            date.toLocaleDateString("en-IN", {
                month: "long",
                year: "numeric"
            });

        select.appendChild(option);
    }
});

// ================= DOWNLOAD REPORT =================

function downloadReport() {

    const monthDate = new Date(reportMonth.value);
    const selectedMonth = monthDate.getMonth();
    const selectedYear = monthDate.getFullYear();
    const typeFilter = reportType.value;

    const employees =
        JSON.parse(localStorage.getItem("employees")) || [];

    let rows = [
        ["Name","Worker Type","Date","Status","Daily Wage","Earned","Payment"]
    ];

    employees.forEach(emp => {

        if (typeFilter !== "all" && emp.type !== typeFilter)
            return;

        for (let date in emp.attendance) {

            const d = new Date(date);

            if (
                d.getMonth() === selectedMonth &&
                d.getFullYear() === selectedYear
            ) {

                const status = emp.attendance[date];
                const earned =
                    status === "present" ? emp.wage : 0;

                const payment = emp.payments[date] || 0;

                rows.push([
                    emp.name,
                    emp.type === "headWorkers" ? "Head Worker" : "Labourer",
                    date,
                    status,
                    emp.wage,
                    earned,
                    payment
                ]);
            }
        }
    });

    exportToCSV(rows);
}

// ================= EXPORT FUNCTION =================

function exportToCSV(rows) {

    let csvContent = "data:text/csv;charset=utf-8,";

    rows.forEach(row => {
        csvContent += row.join(",") + "\r\n";
    });

    const encodedUri = encodeURI(csvContent);

    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "Attendance_Report.csv");
    document.body.appendChild(link);

    link.click();
}

</script>

</body>
</html>
