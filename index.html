<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffde59">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="खाताबुक">
    <title>Attendance System</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">
        <div class="logo-section">
            <img src="logo.png" width="24" height="28" class="Khatabook" id="logoBtn" style="cursor:pointer;">
            <h1 class="company-name">खाताबुक</h1>

            <div class="logo-dropdown" id="logoDropdown">
                <div onclick="goHome()">🏠 Home</div>
                <div onclick="goReport()">📥 Download Report</div>
                <div onclick="exportBackup()">💾 Backup Data</div>
                <div onclick="importBackup()">📂 Restore Backup</div>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none"
                onchange="handleImportFile(this)">
        </div>

        <div class="header-right">
            <div class="date-display" id="currentDate"></div>
            <button class="add-btn" onclick="openAddEmployee()">+</button>
        </div>
    </header>

    <!-- ================= SEARCH BAR ================= -->

    <div class="search-container">
        <input type="text" class="search-input" placeholder="🔍 Search employee by name..."
            oninput="filterEmployees(this.value)">
    </div>

    <!-- ================= WORKER SECTIONS ================= -->

    <section class="worker-section">
        <div class="worker-header" onclick="toggleSection('headWorkers', this)">
            <span>👷 मिस्त्री</span>
            <span class="arrow">↓</span>
        </div>
        <div class="employee-grid" id="headWorkers"></div>
    </section>

    <section class="worker-section">
        <div class="worker-header" onclick="toggleSection('labourers', this)">
            <span>🧱 लेबर</span>
            <span class="arrow">↓</span>
        </div>
        <div class="employee-grid" id="labourers"></div>
    </section>

    <!-- ================= ADD EMPLOYEE MODAL ================= -->

    <div class="modal" id="employeeModal">
        <div class="modal-content glass-card">
            <h2>नाम झोड़े</h2>

            <input type="text" id="empName" placeholder="नाम दर्ज करें">
            <input type="number" id="dailyWage" placeholder="Daily Salary (₹)">
            <input type="tel" id="empPhone" placeholder="📞 Phone Number (optional)">

            <select id="workerType">
                <option value="headWorkers">👷 मिस्त्री</option>
                <option value="labourers">🧱 लेबर</option>
            </select>

            <div class="modal-buttons">
                <button onclick="saveEmployee()">✅ झोड़े</button>
                <button onclick="closeModal()" class="cancel-btn">✕ Cancel</button>
            </div>
        </div>
    </div>

    <!-- ================= ATTENDANCE SCREEN ================= -->

    <div class="attendance-screen" id="attendanceScreen">

        <div class="attendance-header glass-card">
            <button class="month-nav" onclick="changeMonth(-1)">‹</button>
            <h2 id="attendanceMonth"></h2>
            <button class="month-nav" onclick="changeMonth(1)">›</button>
            <button class="close-attendance" onclick="closeAttendance()">✕</button>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar" id="calendar"></div>
        </div>

        <div id="summary" class="glass-card summary-card"></div>

    </div>

    <!-- ================= PAYMENT MODAL ================= -->

    <div class="payment-modal" id="paymentModal" onclick="closePayment()">
        <div class="payment-box glass-card" onclick="event.stopPropagation()">
            <h3>💸 Payment paid</h3>
            <input type="number" id="paymentAmount" placeholder="Enter Amount (₹)">
            <div class="modal-buttons" style="margin-top:14px;">
                <button onclick="savePayment()">✅ Save</button>
                <button onclick="closePayment()" class="cancel-btn">✕ Cancel</button>
            </div>
        </div>
    </div>

    <!-- ================= CUSTOM CONFIRM DIALOG ================= -->

    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-box glass-card">
            <p id="confirmMsg"></p>
            <div class="modal-buttons">
                <button onclick="acceptConfirm()">✅ हाँ</button>
                <button onclick="closeConfirm()" class="cancel-btn">✕ नहीं</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
