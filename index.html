<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1 class="company-name">MY COMPANY NAME</h1>
        <div class="right-header">
            <span id="currentMonth"></span>
            <div class="download-wrapper">
                <button class="download-btn">⬇</button>
                <div class="download-menu">
                    <button>Current Month</button>
                    <button>Last Month</button>
                    <button>Previous Month</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Worker Sections -->

    <section class="worker-section">
        <div class="worker-header" onclick="toggleSection('headWorkers')">
            Head Workers ▼
        </div>
        <div class="employee-grid" id="headWorkers"></div>
    </section>

    <section class="worker-section">
        <div class="worker-header" onclick="toggleSection('labourers')">
            Labourers ▼
        </div>
        <div class="employee-grid" id="labourers"></div>
    </section>

    <!-- Add Employee Card -->
    <div class="add-card" onclick="openAddEmployee()">
        <span>+</span>
        <p>Add Employee</p>
    </div>

  
<!-- Add Employee Modal -->
<div class="modal" id="employeeModal">
    <div class="modal-content">
        <h2>Add Employee</h2>

        <input type="text" id="empName" placeholder="Employee Name">

        <input type="number" id="dailyWage" placeholder="Daily Wage">

        <select id="workerType">
            <option value="headWorkers">Head Worker</option>
            <option value="labourers">Labourer</option>
        </select>

        <input type="file" id="empImage" accept="image/*">

        <button onclick="saveEmployee()">Save</button>
        <button onclick="closeModal()" class="close-btn">Cancel</button>
    </div>
</div>
<div class="attendance-screen" id="attendanceScreen">
    <div class="attendance-header">
        <h2>Attendance</h2>
        <button class="close-attendance" onclick="closeAttendance()">✖</button>
    </div>

    <h3 id="attendanceMonth"></h3>

    <div class="calendar" id="calendar"></div>

    <div id="summary"></div>
</div>
  
<script src="script.js"></script>
</body>
</html>
